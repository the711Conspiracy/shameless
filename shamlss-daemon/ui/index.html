<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shamlss</title>
<style>
:root {
  --bg:       #09111f;
  --surface:  #0f1a2e;
  --card:     #162033;
  --border:   #1e2d47;
  --amber:    #f59e0b;
  --amber2:   #fbbf24;
  --amber-bg: rgba(245,158,11,.08);
  --text:     #e2e8f0;
  --text2:    #94a3b8;
  --text3:    #4b6080;
  --red:      #ef4444;
  --green:    #22c55e;
  --sidebar:  220px;
  --player:   80px;
  --radius:   6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* ── App shell ── */
#shell { display: flex; flex: 1; overflow: hidden; }
#sidebar { width: var(--sidebar); flex-shrink: 0; background: #060d1a; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
#main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

/* ── Sidebar ── */
.s-logo { padding: 24px 20px 20px; font-family: 'Courier New', monospace; font-size: 22px; font-weight: 700; letter-spacing: 3px; color: var(--text); }
.s-logo em { color: var(--amber); font-style: normal; }
.s-nav { display: flex; flex-direction: column; gap: 2px; padding: 0 8px; }
.s-nav a { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius); color: var(--text2); font-size: 13px; font-weight: 500; letter-spacing: .3px; cursor: pointer; text-decoration: none; transition: color .15s, background .15s; }
.s-nav a:hover { color: var(--text); background: var(--card); }
.s-nav a.active { color: var(--amber); background: var(--amber-bg); }
.s-nav a svg { flex-shrink: 0; opacity: .7; }
.s-nav a.active svg { opacity: 1; }
.s-divider { height: 1px; background: var(--border); margin: 12px 16px; }
.s-stats { padding: 12px 20px 20px; }
.s-stats-label { font-size: 10px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
.s-stat { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; color: var(--text2); }
.s-stat b { color: var(--amber); font-weight: 600; }

/* ── Main header ── */
.m-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 28px 0; gap: 16px; flex-shrink: 0; }
.m-tabs { display: flex; gap: 4px; }
.tab { background: none; border: none; color: var(--text2); font-size: 13px; font-weight: 600; letter-spacing: .5px; padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: all .15s; }
.tab:hover { color: var(--text); background: var(--card); }
.tab.active { color: var(--bg); background: var(--amber); }
.m-actions { display: flex; gap: 6px; }
.btn-lib-action { background: none; border: 1px solid var(--border); border-radius: 20px; color: var(--text2); font-size: 12px; padding: 6px 14px; cursor: pointer; transition: all .15s; }
.btn-lib-action:hover { border-color: var(--amber); color: var(--amber); }
.m-search { position: relative; }
.m-search input { background: var(--card); border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-size: 13px; padding: 7px 14px 7px 36px; width: 220px; outline: none; transition: border-color .15s; }
.m-search input:focus { border-color: var(--amber); }
.m-search input::placeholder { color: var(--text3); }
.m-search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }

/* ── Content area ── */
#content { flex: 1; padding: 16px 28px 28px; }

/* ── Track list ── */
.tl-header { display: grid; grid-template-columns: 44px 1fr 180px 52px; padding: 0 12px 8px; border-bottom: 1px solid var(--border); margin-bottom: 4px; cursor: default; }
.tl-header span { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }
.tl-header span.sortable { cursor: pointer; user-select: none; }
.tl-header span.sortable:hover { color: var(--text2); }
.tl-header span.sort-asc::after { content: ' ↑'; }
.tl-header span.sort-desc::after { content: ' ↓'; }
.track-row { display: grid; grid-template-columns: 44px 1fr 180px 52px; align-items: center; padding: 3px 12px; border-radius: var(--radius); cursor: pointer; transition: background .1s; content-visibility: auto; contain-intrinsic-size: 0 52px; }
.track-row:hover { background: var(--card); }
.track-row:hover .t-num { display: none; }
.track-row:hover .t-play { display: flex; }
.track-row.playing { background: var(--amber-bg); }
.track-row.playing .t-num { display: none; }
.track-row.playing .t-eq { display: flex; }
.t-idx { display: flex; align-items: center; justify-content: center; width: 44px; }
.t-num { color: var(--text3); font-size: 13px; }
.t-play { display: none; align-items: center; justify-content: center; color: var(--text); }
.t-eq { display: none; align-items: flex-end; gap: 2px; height: 14px; }
.t-eq b { width: 3px; background: var(--amber); border-radius: 1px; }
.t-eq b:nth-child(1) { animation: eq1 .8s ease infinite; }
.t-eq b:nth-child(2) { animation: eq2 .55s ease infinite; }
.t-eq b:nth-child(3) { animation: eq3 .7s ease infinite; }
@keyframes eq1 { 0%,100%{height:3px} 50%{height:13px} }
@keyframes eq2 { 0%,100%{height:9px} 50%{height:3px} }
@keyframes eq3 { 0%,100%{height:6px} 50%{height:13px} }
.t-main { display: flex; align-items: center; gap: 12px; min-width: 0; }
.t-art { width: 40px; height: 40px; border-radius: 4px; flex-shrink: 0; background: var(--card); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.t-art img { width: 100%; height: 100%; object-fit: cover; }
.t-info { min-width: 0; }
.t-title { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-row.playing .t-title { color: var(--amber); }
.t-artist { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; cursor: pointer; }
.t-artist:hover { color: var(--amber); text-decoration: underline; }
.t-album { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 8px; cursor: pointer; }
.t-album:hover { color: var(--text); }
.t-dur { font-size: 12px; color: var(--text3); text-align: right; font-variant-numeric: tabular-nums; }

/* ── Albums grid ── */
.albums-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding-top: 4px; }
.album-card { cursor: pointer; border-radius: var(--radius); transition: background .15s; padding: 12px; }
.album-card:hover { background: var(--card); }
.album-art-wrap { position: relative; border-radius: var(--radius); overflow: hidden; aspect-ratio: 1; background: var(--card); margin-bottom: 12px; }
.album-art-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.album-art-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 40px; background: linear-gradient(135deg, var(--card), var(--surface)); color: var(--text3); font-family: 'Courier New', monospace; font-weight: 700; letter-spacing: -1px; }
.album-play-btn { position: absolute; bottom: 8px; right: 8px; width: 36px; height: 36px; background: var(--amber); border-radius: 50%; display: none; align-items: center; justify-content: center; color: var(--bg); transition: transform .15s; box-shadow: 0 4px 12px rgba(0,0,0,.4); }
.album-card:hover .album-play-btn { display: flex; }
.album-play-btn:hover { transform: scale(1.08); }
.album-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.album-artist { font-size: 12px; color: var(--text2); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── Artists list ── */
.artists-list { display: flex; flex-direction: column; gap: 2px; }
.artist-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: var(--radius); cursor: pointer; transition: background .1s; }
.artist-row:hover { background: var(--card); }
.artist-name { font-size: 13px; font-weight: 600; color: var(--text); }
.artist-row:hover .artist-name { color: var(--amber); }
.artist-meta { font-size: 12px; color: var(--text3); text-align: right; }

/* ── Playlists view ── */
.pl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
.pl-card { background: var(--card); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: background .15s; position: relative; }
.pl-card:hover { background: var(--border); }
.pl-card-icon { font-size: 32px; margin-bottom: 12px; }
.pl-card-name { font-size: 13px; font-weight: 600; color: var(--text); }
.pl-card-count { font-size: 11px; color: var(--text3); margin-top: 4px; }
.pl-back { display: flex; align-items: center; gap: 8px; color: var(--text2); cursor: pointer; font-size: 13px; margin-bottom: 16px; }
.pl-back:hover { color: var(--amber); }
.pl-detail-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.pl-detail-meta { font-size: 12px; color: var(--text3); margin-bottom: 20px; }
.btn-new-pl { display: flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--border); border-radius: var(--radius); color: var(--text2); font-size: 12px; padding: 7px 14px; cursor: pointer; transition: all .15s; margin-bottom: 24px; }
.btn-new-pl:hover { border-color: var(--amber); color: var(--amber); }

/* ── Context menu ── */
.ctx-menu { position: fixed; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 8px 24px rgba(0,0,0,.5); z-index: 999; min-width: 160px; padding: 4px 0; }
.ctx-item { padding: 8px 16px; font-size: 13px; color: var(--text2); cursor: pointer; white-space: nowrap; }
.ctx-item:hover { background: var(--card); color: var(--text); }

/* ── Settings view ── */
.settings-section { max-width: 540px; }
.settings-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
.settings-group { margin-bottom: 28px; }
.settings-group-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--amber); margin-bottom: 12px; }
.folder-row { display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 8px; font-size: 12px; color: var(--text2); font-family: monospace; }
.folder-row button { background: none; border: 1px solid var(--text3); border-radius: 4px; color: var(--text3); font-size: 11px; padding: 3px 8px; cursor: pointer; transition: all .15s; }
.folder-row button:hover { border-color: var(--red); color: var(--red); }
.add-folder-row { display: flex; gap: 8px; }
.add-folder-row input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 13px; padding: 8px 12px; outline: none; }
.add-folder-row input:focus { border-color: var(--amber); }
.btn-primary { background: var(--amber); color: var(--bg); border: none; border-radius: var(--radius); font-size: 12px; font-weight: 700; letter-spacing: 1px; padding: 8px 18px; cursor: pointer; transition: background .15s; }
.btn-primary:hover { background: var(--amber2); }
.node-info { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; font-family: monospace; font-size: 11px; color: var(--text2); word-break: break-all; line-height: 1.8; }
.status-msg { font-size: 12px; color: var(--text2); min-height: 18px; margin-top: 8px; }

/* ── Player bar ── */
#player { height: var(--player); background: var(--surface); border-top: 1px solid var(--border); display: grid; grid-template-columns: 280px 1fr 280px; align-items: center; flex-shrink: 0; gap: 16px; padding: 0 20px; }
.p-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
.p-art { width: 52px; height: 52px; border-radius: 4px; background: var(--card); flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; color: var(--text3); }
.p-art img { width: 100%; height: 100%; object-fit: cover; }
.p-info { min-width: 0; }
.p-title { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.p-artist { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.p-center { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.p-controls { display: flex; align-items: center; gap: 6px; }
.p-controls button { background: none; border: none; color: var(--text2); cursor: pointer; padding: 6px; border-radius: 50%; transition: color .15s, background .15s; display: flex; align-items: center; }
.p-controls button:hover { color: var(--text); background: var(--card); }
.p-controls button.active { color: var(--amber); }
.btn-playpause { background: var(--text) !important; color: var(--bg) !important; width: 34px; height: 34px; border-radius: 50% !important; }
.btn-playpause:hover { background: white !important; transform: scale(1.05); }
.p-progress { display: flex; align-items: center; gap: 8px; width: 100%; }
.p-time { font-size: 11px; color: var(--text3); font-variant-numeric: tabular-nums; flex-shrink: 0; width: 36px; }
.p-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; cursor: pointer; position: relative; }
.p-bar:hover { height: 6px; }
.p-fill { height: 100%; background: var(--text2); border-radius: 2px; transition: width .1s linear; pointer-events: none; }
.p-bar:hover .p-fill { background: var(--amber); }
.p-right { display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
.p-right button { background: none; border: none; color: var(--text2); cursor: pointer; padding: 6px; border-radius: 4px; transition: color .15s; display: flex; }
.p-right button:hover { color: var(--text); }
.p-right button.active { color: var(--amber); }
#vol-slider { -webkit-appearance: none; appearance: none; width: 80px; height: 4px; background: var(--border); border-radius: 2px; outline: none; cursor: pointer; }
#vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--text); border-radius: 50%; }
#vol-slider:hover { background: var(--text3); }

/* ── Toast ── */
#toasts { position: fixed; top: 16px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; max-width: 340px; }
.toast { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-size: 12px; color: var(--text2); pointer-events: auto; display: flex; align-items: flex-start; gap: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.4); animation: toast-in .2s ease; }
.toast.error { border-color: var(--red); }
.toast.warn  { border-color: var(--amber); }
.toast.ok    { border-color: var(--green); }
.toast-icon { flex-shrink: 0; margin-top: 1px; }
.toast-msg  { flex: 1; word-break: break-word; line-height: 1.4; }
@keyframes toast-in { from { opacity: 0; transform: translateX(16px) } to { opacity: 1; transform: none } }

/* ── WS status dot ── */
.ws-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); display: inline-block; flex-shrink: 0; }
.ws-dot.ok { background: var(--green); }
.ws-dot.warn { background: var(--amber); animation: pulse .8s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── Daemon log ── */
.log-panel { background: #030810; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.7; max-height: 320px; overflow-y: auto; }
.log-line { display: flex; gap: 8px; }
.log-ts { color: var(--text3); flex-shrink: 0; }
.log-level { flex-shrink: 0; width: 38px; }
.log-level.INFO  { color: var(--text2); }
.log-level.DEBUG { color: var(--text3); }
.log-level.WARN  { color: var(--amber); }
.log-level.ERROR { color: var(--red); }
.log-mod { color: var(--amber); flex-shrink: 0; min-width: 70px; }
.log-msg { color: var(--text2); white-space: pre-wrap; word-break: break-all; }
.log-err { color: var(--red); }

.empty-state { text-align: center; padding: 80px 20px; color: var(--text3); }
.empty-state svg { margin-bottom: 16px; opacity: .4; }
.empty-state p { font-size: 13px; }
.loading { text-align: center; padding: 60px; color: var(--text3); font-size: 13px; letter-spacing: 1px; }
</style>
</head>
<body>

<div id="shell">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="s-logo" style="display:flex;align-items:center;justify-content:space-between">
      <span>Shaml<em>ss</em></span>
      <span class="ws-dot" id="ws-dot" title="Daemon connection"></span>
    </div>
    <div class="s-nav">
      <a id="nav-library" onclick="showView('library')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Library
      </a>
      <a id="nav-playlists" onclick="showView('playlists')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Playlists
      </a>
      <a id="nav-settings" onclick="showView('settings')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </a>
    </div>
    <div class="s-divider"></div>
    <div class="s-stats">
      <div class="s-stats-label">Library</div>
      <div class="s-stat"><span>Tracks</span><b id="stat-tracks">—</b></div>
      <div class="s-stat"><span>Artists</span><b id="stat-artists">—</b></div>
      <div class="s-stat"><span>Albums</span><b id="stat-albums">—</b></div>
    </div>
  </nav>

  <!-- Main -->
  <main id="main">
    <div class="m-header">
      <div class="m-tabs" id="tab-bar">
        <button class="tab active" onclick="setTab('tracks')">Tracks</button>
        <button class="tab" onclick="setTab('artists')">Artists</button>
        <button class="tab" onclick="setTab('albums')">Albums</button>
      </div>
      <div class="m-actions" id="lib-actions">
        <button class="btn-lib-action" onclick="playAll()" title="Play All (P)">&#9654; Play All</button>
        <button class="btn-lib-action" onclick="shuffleAll()" title="Shuffle All (S)">&#8652; Shuffle</button>
      </div>
      <div class="m-search" id="search-wrap">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" type="text" placeholder="Search…" oninput="onSearch(this.value)" autocomplete="off">
      </div>
    </div>
    <div id="content"><div class="loading">Loading library…</div></div>
  </main>
</div>

<!-- Player bar -->
<footer id="player">
  <div class="p-left">
    <div class="p-art" id="p-art">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    </div>
    <div class="p-info">
      <div class="p-title" id="p-title">Nothing playing</div>
      <div class="p-artist" id="p-artist">Open the library to play music</div>
    </div>
  </div>
  <div class="p-center">
    <div class="p-controls">
      <button id="btn-shuffle" title="Shuffle" onclick="toggleShuffle()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      </button>
      <button onclick="prev()" title="Previous (←)">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      </button>
      <button class="btn-playpause" id="btn-play" onclick="playPause()" title="Play/Pause (Space)">
        <svg id="icon-play" width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="icon-pause" width="16" height="16" fill="currentColor" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button onclick="next()" title="Next (→)">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      </button>
      <button id="btn-repeat" title="Repeat" onclick="toggleRepeat()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>
    <div class="p-progress">
      <span class="p-time" id="p-time">0:00</span>
      <div class="p-bar" id="p-bar" onclick="seek(event)">
        <div class="p-fill" id="p-fill" style="width:0%"></div>
      </div>
      <span class="p-time" style="text-align:right" id="p-dur">0:00</span>
    </div>
  </div>
  <div class="p-right">
    <button id="btn-queue" title="Queue" onclick="toggleQueue()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </button>
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
    <input id="vol-slider" type="range" min="0" max="1" step="0.01" value="0.8" oninput="setVol(this.value)" title="Volume">
  </div>
</footer>

<script>
'use strict'

// ── State ──────────────────────────────────────────────────────
const S = {
  tracks: [], playlists: [],
  queue: [], qi: -1,
  playing: false, shuffle: false, repeat: 'none', // 'none' | 'one' | 'all'
  tab: 'tracks', view: 'library', query: '',
  artistFilter: null, albumFilter: null,
  sortCol: null, sortDir: 1, // 1=asc, -1=desc
}

// ── Audio ──────────────────────────────────────────────────────
const aud = new Audio()
aud.volume = 0.8
aud.addEventListener('ended', onEnded)
aud.addEventListener('timeupdate', onTimeUpdate)
aud.addEventListener('error', () => { S.playing = false; updatePlayer() })
aud.addEventListener('play', () => { S.playing = true; updatePlayer() })
aud.addEventListener('pause', () => { S.playing = false; updatePlayer() })
aud.addEventListener('loadedmetadata', updatePlayer)

// ── Toast ──────────────────────────────────────────────────────
function showToast(type, msg, duration = 5000) {
  const icons = { error: '✕', warn: '⚠', ok: '✓' }
  const el = document.createElement('div')
  el.className = `toast ${type}`
  el.innerHTML = `<span class="toast-icon">${icons[type] || '·'}</span><span class="toast-msg">${esc(msg)}</span>`
  const container = document.getElementById('toasts')
  container.appendChild(el)
  setTimeout(() => el.remove(), duration)
}

// ── API ────────────────────────────────────────────────────────
// api() shows a toast on any error, then re-throws so callers can .catch(() => fallback)
async function api(path, opts = {}) {
  let r
  try {
    r = await fetch(path, opts)
  } catch (e) {
    showToast('error', `Network error: ${path.split('?')[0]}`)
    throw e
  }
  if (!r.ok) {
    let errMsg = `HTTP ${r.status}`
    try { const b = await r.json(); errMsg = b.error || errMsg } catch {}
    showToast('error', `${path.split('?')[0]}: ${errMsg}`)
    throw new Error(errMsg)
  }
  return r.json()
}

// ── Playback ───────────────────────────────────────────────────
function setQueue(tracks, startAt = 0) {
  S.queue = tracks.slice()
  if (S.shuffle) shuffleQueue(startAt)
  playAt(S.shuffle ? 0 : startAt)
}

function shuffleQueue(keepIdx = 0) {
  const first = S.queue.splice(keepIdx, 1)[0]
  for (let i = S.queue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [S.queue[i], S.queue[j]] = [S.queue[j], S.queue[i]]
  }
  if (first) S.queue.unshift(first)
}

function playAt(qi) {
  if (qi < 0 || qi >= S.queue.length) return
  S.qi = qi
  const t = S.queue[qi]
  aud.src = `/stream/${t.id}`
  aud.play().catch(() => {})
  updatePlayer()
  highlightPlayingRow()
}

function playPause() {
  if (!S.queue.length) return
  aud.paused ? aud.play() : aud.pause()
}

function next() {
  if (!S.queue.length) return
  const ni = S.qi + 1
  if (ni >= S.queue.length) {
    if (S.repeat === 'all') playAt(0)
    else { aud.pause(); aud.currentTime = 0 }
  } else playAt(ni)
}

function prev() {
  if (!S.queue.length) return
  if (aud.currentTime > 3) { aud.currentTime = 0; return }
  playAt(Math.max(0, S.qi - 1))
}

function onEnded() {
  if (S.repeat === 'one') { aud.currentTime = 0; aud.play(); return }
  next()
}

function seek(e) {
  if (!aud.duration) return
  const rect = e.currentTarget.getBoundingClientRect()
  aud.currentTime = ((e.clientX - rect.left) / rect.width) * aud.duration
}

function setVol(v) { aud.volume = parseFloat(v) }

function toggleShuffle() {
  S.shuffle = !S.shuffle
  document.getElementById('btn-shuffle').classList.toggle('active', S.shuffle)
}

function toggleRepeat() {
  const modes = ['none', 'all', 'one']
  S.repeat = modes[(modes.indexOf(S.repeat) + 1) % 3]
  const btn = document.getElementById('btn-repeat')
  btn.classList.toggle('active', S.repeat !== 'none')
  btn.title = S.repeat === 'one' ? 'Repeat: One' : S.repeat === 'all' ? 'Repeat: All' : 'Repeat: Off'
}

function onTimeUpdate() {
  const cur = aud.currentTime, dur = aud.duration || 0
  document.getElementById('p-fill').style.width = dur ? `${(cur / dur) * 100}%` : '0%'
  document.getElementById('p-time').textContent = fmt(cur)
  document.getElementById('p-dur').textContent = fmt(dur)
}

function fmt(s) {
  s = Math.floor(s || 0)
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`
}

// ── Player bar ─────────────────────────────────────────────────
function updatePlayer() {
  const t = S.queue[S.qi]
  if (!t) return
  document.getElementById('p-title').textContent = t.title || 'Unknown'
  document.getElementById('p-artist').textContent = t.artist || '—'
  const art = document.getElementById('p-art')
  if (t.art_hash) {
    art.innerHTML = `<img src="/library/art/${t.id}" onerror="this.parentElement.innerHTML='<svg width=20 height=20 fill=none stroke=currentColor stroke-width=1.5 viewBox=\"0 0 24 24\"><path d=\"M9 18V5l12-2v13\"/><circle cx=6 cy=18 r=3/><circle cx=18 cy=16 r=3/></svg>'">`
  } else {
    art.innerHTML = `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`
  }
  const playing = !aud.paused
  document.getElementById('icon-play').style.display = playing ? 'none' : ''
  document.getElementById('icon-pause').style.display = playing ? '' : 'none'
  document.title = t.title ? `${t.title} — Shamlss` : 'Shamlss'
}

function highlightPlayingRow() {
  document.querySelectorAll('.track-row.playing').forEach(el => el.classList.remove('playing'))
  const t = S.queue[S.qi]
  if (t) {
    const el = document.querySelector(`.track-row[data-id="${t.id}"]`)
    if (el) { el.classList.add('playing'); el.scrollIntoView({ block: 'nearest' }) }
  }
}

// ── Quick-add to queue ─────────────────────────────────────────
function addToQueue(idx) {
  const t = (window._filteredTracks || S.tracks)[idx]
  if (!t) return
  S.queue.push(t)
  if (S.qi < 0) playAt(0)
}

// ── Play All / Shuffle All ─────────────────────────────────────
function playAll() {
  const f = filtered()
  if (f.length) { S.shuffle = false; document.getElementById('btn-shuffle').classList.remove('active'); setQueue(f, 0) }
}

function shuffleAll() {
  const f = filtered()
  if (!f.length) return
  S.shuffle = true
  document.getElementById('btn-shuffle').classList.add('active')
  setQueue(f, Math.floor(Math.random() * f.length))
}

// ── Sort ───────────────────────────────────────────────────────
function sortBy(col) {
  if (S.sortCol === col) S.sortDir *= -1
  else { S.sortCol = col; S.sortDir = 1 }
  renderCurrent()
  document.querySelectorAll('.tl-header span.sortable').forEach(el => {
    el.classList.remove('sort-asc', 'sort-desc')
    if (el.dataset.col === col) el.classList.add(S.sortDir === 1 ? 'sort-asc' : 'sort-desc')
  })
}

function sortedTracks(tracks) {
  if (!S.sortCol) return tracks
  return tracks.slice().sort((a, b) => {
    let av = a[S.sortCol] ?? '', bv = b[S.sortCol] ?? ''
    if (S.sortCol === 'duration') { av = a.duration || 0; bv = b.duration || 0; return (av - bv) * S.sortDir }
    return String(av).localeCompare(String(bv)) * S.sortDir
  })
}

// ── Filters & search ───────────────────────────────────────────
function onSearch(q) {
  S.query = q.toLowerCase()
  S.artistFilter = null; S.albumFilter = null
  renderCurrent()
}

function filtered() {
  let t = S.tracks
  if (S.artistFilter) t = t.filter(x => x.artist === S.artistFilter)
  if (S.albumFilter) t = t.filter(x => x.album === S.albumFilter.name && x.artist === S.albumFilter._artist)
  if (S.query) t = t.filter(x =>
    (x.title || '').toLowerCase().includes(S.query) ||
    (x.artist || '').toLowerCase().includes(S.query) ||
    (x.album || '').toLowerCase().includes(S.query)
  )
  return t
}

function filterByArtist(artist) {
  S.artistFilter = artist; S.albumFilter = null; S.query = ''
  document.getElementById('search-input').value = ''
  showView('library'); setTab('tracks', false)
  renderCurrent()
}

function filterByAlbum(album, artist) {
  S.albumFilter = { name: album, _artist: artist }; S.artistFilter = null; S.query = ''
  document.getElementById('search-input').value = ''
  showView('library'); setTab('tracks', false)
  renderCurrent()
}

// ── Render: tracks ─────────────────────────────────────────────
function buildTrackRows(tracks) {
  const playingId = S.queue[S.qi]?.id
  return sortedTracks(tracks).map((t, i) => {
    const art = t.art_hash
      ? `<img src="/library/art/${t.id}" loading="lazy" onerror="this.style.display='none'">`
      : `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`
    const playing = t.id === playingId
    return `<div class="track-row${playing ? ' playing' : ''}" data-id="${t.id}" data-idx="${i}" onclick="rowClick(event,this)" oncontextmenu="ctxMenu(event,${i})">
      <div class="t-idx">
        <span class="t-num">${i + 1}</span>
        <span class="t-play"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></span>
        <span class="t-eq"><b></b><b></b><b></b></span>
      </div>
      <div class="t-main">
        <div class="t-art">${art}</div>
        <div class="t-info">
          <div class="t-title" title="${esc(t.title)}">${esc(t.title || 'Unknown')}</div>
          <div class="t-artist" data-artist="${esc(t.artist || '')}" onclick="event.stopPropagation();filterByArtist(this.dataset.artist)" title="${esc(t.artist)}">${esc(t.artist || '—')}</div>
        </div>
      </div>
      <div class="t-album" data-album="${esc(t.album || '')}" data-artist="${esc(t.artist || '')}" onclick="event.stopPropagation();filterByAlbum(this.dataset.album,this.dataset.artist)" title="${esc(t.album)}">${esc(t.album || '—')}</div>
      <div class="t-dur">${fmt(t.duration ? t.duration / 1000 : 0)}</div>
    </div>`
  }).join('')
}

function renderTracks(tracks) {
  if (!tracks.length) { document.getElementById('content').innerHTML = emptyState('No tracks found', 'Add a music folder in Settings'); return }
  window._filteredTracks = sortedTracks(tracks)
  const header = `<div class="tl-header">
    <span>#</span>
    <span class="sortable" data-col="title" onclick="sortBy('title')">Title</span>
    <span class="sortable" data-col="album" onclick="sortBy('album')">Album</span>
    <span class="sortable" data-col="duration" onclick="sortBy('duration')" style="text-align:right">Time</span>
  </div>`
  document.getElementById('content').innerHTML = header + `<div id="tl">${buildTrackRows(tracks)}</div>`
  // re-apply sort indicators
  if (S.sortCol) {
    const el = document.querySelector(`.tl-header span[data-col="${S.sortCol}"]`)
    if (el) el.classList.add(S.sortDir === 1 ? 'sort-asc' : 'sort-desc')
  }
}

function rowClick(e, el) {
  if (e.target.classList.contains('t-artist') || e.target.classList.contains('t-album')) return
  const i = parseInt(el.dataset.idx)
  setQueue(window._filteredTracks || S.tracks, i)
}

// ── Context menu ───────────────────────────────────────────────
function ctxMenu(e, idx) {
  e.preventDefault()
  closeCtx()
  const menu = document.createElement('div')
  menu.className = 'ctx-menu'
  menu.id = 'ctx-menu'
  menu.style.left = `${e.clientX}px`
  menu.style.top = `${e.clientY}px`
  menu.innerHTML = `
    <div class="ctx-item" onclick="closeCtx();setQueue(window._filteredTracks||S.tracks,${idx})">▶ Play now</div>
    <div class="ctx-item" onclick="closeCtx();addToQueue(${idx})">+ Add to queue</div>`
  document.body.appendChild(menu)
  // Reposition if off-screen
  const r = menu.getBoundingClientRect()
  if (r.right > window.innerWidth) menu.style.left = `${e.clientX - r.width}px`
  if (r.bottom > window.innerHeight) menu.style.top = `${e.clientY - r.height}px`
}

function closeCtx() {
  document.getElementById('ctx-menu')?.remove()
}

document.addEventListener('click', closeCtx)
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCtx()
})

// ── Render: albums ─────────────────────────────────────────────
function renderAlbums(tracks) {
  const map = new Map()
  for (const t of tracks) {
    const key = `${t.album || ''}§${t.artist || ''}`
    if (!map.has(key)) map.set(key, { album: t.album, artist: t.artist, tracks: [], rep: t })
    map.get(key).tracks.push(t)
  }
  if (!map.size) { document.getElementById('content').innerHTML = emptyState('No albums', ''); return }
  const cards = [...map.values()].map(a => {
    const label = (a.album || 'Unknown Album').slice(0, 2).toUpperCase()
    const art = a.rep.art_hash
      ? `<img src="/library/art/${a.rep.id}" loading="lazy" onerror="this.style.display='none'">`
      : ''
    return `<div class="album-card" data-album="${esc(a.album || '')}" data-artist="${esc(a.artist || '')}" onclick="filterByAlbum(this.dataset.album,this.dataset.artist)">
      <div class="album-art-wrap">
        ${art}
        <div class="album-art-fallback" style="${a.rep.art_hash ? 'display:none' : ''}">${label}</div>
        <div class="album-play-btn" onclick="event.stopPropagation();setQueue(getAlbumTracks(this.closest('.album-card').dataset.album,this.closest('.album-card').dataset.artist),0)">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
      </div>
      <div class="album-name" title="${esc(a.album || 'Unknown Album')}">${esc(a.album || 'Unknown Album')}</div>
      <div class="album-artist">${esc(a.artist || '—')}</div>
    </div>`
  }).join('')
  document.getElementById('content').innerHTML = `<div class="albums-grid">${cards}</div>`
}

function getAlbumTracks(album, artist) {
  return S.tracks.filter(t => (t.album || '') === album && (t.artist || '') === artist)
}

// ── Render: artists ────────────────────────────────────────────
function renderArtists(tracks) {
  const map = new Map()
  for (const t of tracks) {
    const a = t.artist || '—'
    if (!map.has(a)) map.set(a, { albums: new Set(), count: 0 })
    map.get(a).albums.add(t.album); map.get(a).count++
  }
  if (!map.size) { document.getElementById('content').innerHTML = emptyState('No artists', ''); return }
  const rows = [...map.entries()].sort((a, b) => a[0].localeCompare(b[0])).map(([name, d]) => {
    const nAlbums = d.albums.size
    return `<div class="artist-row" data-artist="${esc(name)}" onclick="filterByArtist(this.dataset.artist)">
      <div class="artist-name">${esc(name)}</div>
      <div class="artist-meta">${nAlbums} album${nAlbums !== 1 ? 's' : ''} · ${d.count} track${d.count !== 1 ? 's' : ''}</div>
    </div>`
  }).join('')
  document.getElementById('content').innerHTML = `<div class="artists-list">${rows}</div>`
}

// ── Render: playlists ──────────────────────────────────────────
async function renderPlaylists() {
  S.playlists = await api('/playlists').catch(() => [])
  const cards = S.playlists.map(p => `
    <div class="pl-card" data-plid="${p.id}" onclick="openPlaylist(this.dataset.plid)">
      <div class="pl-card-icon">&#9835;</div>
      <div class="pl-card-name">${esc(p.name)}</div>
      <div class="pl-card-count">${p.track_count} track${p.track_count !== 1 ? 's' : ''}</div>
    </div>`).join('')
  document.getElementById('content').innerHTML = `
    <button class="btn-new-pl" onclick="createPlaylist()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Playlist
    </button>
    <div class="pl-grid">${cards || '<div style="color:var(--text3);font-size:13px">No playlists yet</div>'}</div>`
}

async function openPlaylist(id) {
  const pl = await api(`/playlists/${id}`).catch(() => null)
  if (!pl) return
  document.getElementById('content').innerHTML = `
    <div class="pl-back" onclick="renderPlaylists()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Playlists
    </div>
    <div class="pl-detail-title">${esc(pl.name)}</div>
    <div class="pl-detail-meta">${pl.tracks.length} track${pl.tracks.length !== 1 ? 's' : ''}</div>
    <div class="tl-header">
      <span>#</span><span>Title</span><span>Album</span><span style="text-align:right">Time</span>
    </div>
    <div id="tl"></div>`
  window._filteredTracks = pl.tracks
  document.getElementById('tl').innerHTML = buildTrackRows(pl.tracks)
}

async function createPlaylist() {
  const name = prompt('Playlist name:')
  if (!name?.trim()) return
  await api('/playlists', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) })
  renderPlaylists()
}

// ── Render: settings ──────────────────────────────────────────
let _logTimer = null

async function renderSettings() {
  const [folders, stats, node] = await Promise.all([
    api('/library/folders').catch(() => []),
    api('/stats').catch(() => ({})),
    api('/identity').catch(() => ({})),
  ])
  const folderRows = folders.map(f => `
    <div class="folder-row">
      <span>${esc(f)}</span>
      <button data-folder="${esc(f)}" onclick="removeFolder(this.dataset.folder)">Remove</button>
    </div>`).join('') || '<div style="color:var(--text3);font-size:12px;padding:8px 0">No folders indexed yet</div>'

  document.getElementById('content').innerHTML = `
    <div class="settings-section" style="max-width:640px">
      <div class="settings-title">Settings</div>
      <div class="settings-group">
        <div class="settings-group-label">Music Folders</div>
        <div id="folder-list">${folderRows}</div>
        <div class="add-folder-row" style="margin-top:10px">
          <input id="folder-input" type="text" placeholder="C:\\Users\\You\\Music" onkeydown="if(event.key==='Enter')addFolder()">
          <button class="btn-primary" onclick="addFolder()">SCAN</button>
        </div>
        <div class="status-msg" id="scan-msg"></div>
      </div>
      <div class="settings-group">
        <div class="settings-group-label">Node Identity</div>
        <div class="node-info">
          <b>ID:</b> ${esc(node.node_id || '—')}<br>
          <b>Name:</b> ${esc(node.display_name || '—')}
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-group-label">Stats</div>
        <div class="node-info">
          ${stats.trackCount ?? 0} tracks · ${stats.artistCount ?? 0} artists · ${stats.albumCount ?? 0} albums<br>
          ${stats.playCount ?? 0} plays total
          ${stats.topArtists?.length ? `<br><br><b>Top this week:</b><br>${stats.topArtists.map(a => `${esc(a.artist)} (${a.plays})`).join('<br>')}` : ''}
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-group-label" style="display:flex;align-items:center;justify-content:space-between">
          <span>Daemon Log</span>
          <span style="font-size:10px;color:var(--text3);font-weight:normal;letter-spacing:0" id="log-path"></span>
        </div>
        <div class="log-panel" id="log-panel"><span style="color:var(--text3)">Loading…</span></div>
      </div>
      <div class="settings-group">
        <div class="settings-group-label">Keyboard Shortcuts</div>
        <div class="node-info" style="font-family:inherit;font-size:12px;line-height:2">
          <b>Space</b> — Play / Pause &nbsp;&nbsp; <b>← →</b> — Prev / Next<br>
          <b>↑ ↓</b> — Volume up / down &nbsp;&nbsp; <b>P</b> — Play All &nbsp;&nbsp; <b>S</b> — Shuffle All
        </div>
      </div>
    </div>`

  loadDaemonLog()
  _logTimer = setInterval(loadDaemonLog, 5000)
}

async function loadDaemonLog() {
  const panel = document.getElementById('log-panel')
  const pathEl = document.getElementById('log-path')
  if (!panel) { clearInterval(_logTimer); _logTimer = null; return }
  try {
    const data = await fetch('/logs?n=120').then(r => r.json())
    if (pathEl) pathEl.textContent = data.log_path || ''
    const atBottom = panel.scrollHeight - panel.scrollTop - panel.clientHeight < 40
    const levelColor = { DEBUG: 'var(--text3)', INFO: 'var(--text2)', WARN: 'var(--amber)', ERROR: 'var(--red)' }
    panel.innerHTML = data.entries.map(e => {
      const t = new Date(e.ts).toTimeString().slice(0, 8)
      const col = levelColor[e.level] || 'var(--text2)'
      return `<div class="log-line">
        <span class="log-ts">${t}</span>
        <span class="log-level ${e.level}" style="color:${col}">${e.level}</span>
        <span class="log-mod">[${esc(e.mod)}]</span>
        <span class="log-msg">${esc(e.msg)}${e.err ? ` <span class="log-err">— ${esc(e.err)}</span>` : ''}</span>
      </div>`
    }).join('') || '<span style="color:var(--text3)">No log entries yet</span>'
    if (atBottom) panel.scrollTop = panel.scrollHeight
  } catch {}
}

async function addFolder() {
  const input = document.getElementById('folder-input')
  const msg = document.getElementById('scan-msg')
  const p = input.value.trim()
  if (!p) return
  msg.textContent = 'Scanning…'
  msg.style.color = 'var(--text2)'
  try {
    const r = await api('/library/folders', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ folder_path: p }) })
    const text = `Indexed ${r.indexed} of ${r.files_found} files${r.skipped ? ` (${r.skipped} skipped)` : ''}`
    msg.textContent = text
    msg.style.color = r.indexed > 0 ? 'var(--green)' : 'var(--amber)'
    showToast('ok', text)
    input.value = ''
    loadLibrary()
    // Refresh folder list without losing the scan message
    const fl = document.getElementById('folder-list')
    if (fl) {
      const folders = await api('/library/folders').catch(() => [])
      fl.innerHTML = folders.map(f => `
        <div class="folder-row">
          <span>${esc(f)}</span>
          <button data-folder="${esc(f)}" onclick="removeFolder(this.dataset.folder)">Remove</button>
        </div>`).join('') || '<div style="color:var(--text3);font-size:12px;padding:8px 0">No folders indexed yet</div>'
    }
  } catch (e) {
    msg.textContent = e.message || 'Scan failed'
    msg.style.color = 'var(--red)'
  }
}

async function removeFolder(path) {
  if (!confirm(`Remove "${path}" from library?`)) return
  try {
    await api('/library/folders', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ folder_path: path }) })
    showToast('ok', `Removed: ${path}`)
  } catch {}
  loadLibrary()
  renderSettings()
}

// ── View management ────────────────────────────────────────────
function showView(v) {
  // Stop log polling when leaving settings
  if (_logTimer && v !== 'settings') { clearInterval(_logTimer); _logTimer = null }

  S.view = v; S.artistFilter = null; S.albumFilter = null; S.query = ''
  document.getElementById('search-input').value = ''
  document.querySelectorAll('.s-nav a').forEach(a => a.classList.remove('active'))
  document.getElementById(`nav-${v}`)?.classList.add('active')
  const tabBar = document.getElementById('tab-bar')
  const searchWrap = document.getElementById('search-wrap')
  const libActions = document.getElementById('lib-actions')
  if (v === 'library') {
    tabBar.style.display = ''; searchWrap.style.display = ''; libActions.style.display = ''
    renderCurrent()
  } else {
    tabBar.style.display = 'none'; searchWrap.style.display = 'none'; libActions.style.display = 'none'
    if (v === 'playlists') renderPlaylists()
    else if (v === 'settings') renderSettings()
  }
}

function setTab(tab, doRender = true) {
  S.tab = tab
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === tab))
  if (doRender) renderCurrent()
}

function renderCurrent() {
  const f = filtered()
  if (S.tab === 'tracks') renderTracks(f)
  else if (S.tab === 'albums') renderAlbums(f)
  else if (S.tab === 'artists') renderArtists(f)
}

// ── Queue panel ────────────────────────────────────────────────
function toggleQueue() {
  if (!S.queue.length) return
  const rows = S.queue.map((q, i) => {
    const playing = i === S.qi
    return `<div class="track-row${playing ? ' playing' : ''}" onclick="playAt(${i})" style="cursor:pointer">
      <div class="t-idx"><span class="t-num">${i + 1}</span>${playing ? '<span class="t-eq"><b></b><b></b><b></b></span>' : ''}</div>
      <div class="t-main">
        <div class="t-art">${q.art_hash ? `<img src="/library/art/${q.id}" loading="lazy">` : ''}</div>
        <div class="t-info">
          <div class="t-title" style="${playing ? 'color:var(--amber)' : ''}">${esc(q.title || 'Unknown')}</div>
          <div class="t-artist">${esc(q.artist || '—')}</div>
        </div>
      </div>
      <div class="t-album">${esc(q.album || '—')}</div>
      <div class="t-dur">${fmt(q.duration ? q.duration / 1000 : 0)}</div>
    </div>`
  }).join('')
  document.getElementById('content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:15px;font-weight:700">Queue <span style="color:var(--text3);font-size:13px;font-weight:400">${S.queue.length} tracks</span></div>
      <button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px" onclick="showView('library')">&#10005; Close</button>
    </div>
    <div class="tl-header"><span>#</span><span>Title</span><span>Album</span><span style="text-align:right">Time</span></div>
    ${rows}`
}

// ── Load ───────────────────────────────────────────────────────
async function loadLibrary() {
  S.tracks = await api('/library/tracks').catch(() => [])
  const stats = await api('/stats').catch(() => ({}))
  document.getElementById('stat-tracks').textContent = (S.tracks.length).toLocaleString()
  document.getElementById('stat-artists').textContent = (stats.artistCount ?? 0).toLocaleString()
  document.getElementById('stat-albums').textContent = (stats.albumCount ?? 0).toLocaleString()
  if (S.view === 'library') renderCurrent()
}

// ── WebSocket ──────────────────────────────────────────────────
let _wsOk = false

function setWsDot(state) { // 'ok' | 'warn' | 'off'
  const dot = document.getElementById('ws-dot')
  dot.className = 'ws-dot' + (state === 'ok' ? ' ok' : state === 'warn' ? ' warn' : '')
  dot.title = state === 'ok' ? 'Connected to daemon' : state === 'warn' ? 'Reconnecting…' : 'Disconnected'
}

function connectWs() {
  setWsDot('warn')
  const ws = new WebSocket(`ws://${location.host}`)
  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'ping' }))
    setWsDot('ok')
    if (!_wsOk) showToast('ok', 'Connected to daemon')
    _wsOk = true
  }
  ws.onmessage = e => {
    try {
      const m = JSON.parse(e.data)
      if (m.type === 'library_updated') loadLibrary()
    } catch {}
  }
  ws.onerror = () => setWsDot('warn')
  ws.onclose = () => {
    setWsDot('warn')
    if (_wsOk) showToast('warn', 'Lost connection to daemon — reconnecting…')
    _wsOk = false
    setTimeout(connectWs, 4000)
  }
}

// ── Keyboard shortcuts ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return
  if (e.key === ' ') { e.preventDefault(); playPause() }
  else if (e.key === 'ArrowRight' && !e.shiftKey) next()
  else if (e.key === 'ArrowLeft' && !e.shiftKey) prev()
  else if (e.key === 'ArrowUp') { e.preventDefault(); const v = Math.min(1, aud.volume + 0.05); aud.volume = v; document.getElementById('vol-slider').value = v }
  else if (e.key === 'ArrowDown') { e.preventDefault(); const v = Math.max(0, aud.volume - 0.05); aud.volume = v; document.getElementById('vol-slider').value = v }
  else if (e.key === 'p' || e.key === 'P') { if (S.view === 'library') playAll() }
  else if (e.key === 's' || e.key === 'S') { if (S.view === 'library') shuffleAll() }
})

// ── Utilities ──────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;')
}

function emptyState(title, sub) {
  return `<div class="empty-state">
    <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    <p style="font-size:15px;font-weight:600;margin-bottom:6px">${title}</p>
    ${sub ? `<p>${sub}</p>` : ''}
  </div>`
}

// ── Init ───────────────────────────────────────────────────────
window.onerror = (msg, src, line) => {
  showToast('error', `JS error: ${msg} (${src?.split('/').pop()}:${line})`)
  return false
}
window.addEventListener('unhandledrejection', e => {
  showToast('error', `Unhandled: ${e.reason?.message || e.reason}`)
})

async function init() {
  document.getElementById('nav-library').classList.add('active')
  await loadLibrary()
  connectWs()
}

init()
</script>
<div id="toasts"></div>
</body>
</html>
